<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Koleksi Link by Mang Julzz</title>
    <!-- Font Awesome 6 (free CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Poppins & Inter untuk modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f9fafc 0%, #eef2f5 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            position: relative;
        }

        /* subtle animated background noise/glow */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(37, 99, 235, 0.03) 0%, rgba(0, 0, 0, 0) 70%);
            pointer-events: none;
            z-index: 0;
        }

        .glass-card {
            max-width: 550px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            border-radius: 3rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2), 0 2px 5px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: all 0.2s ease;
            position: relative;
            z-index: 2;
        }

        .inner-padding {
            padding: 2rem 1.8rem 2.5rem;
        }

        /* header area */
        .avatar-icon {
            display: flex;
            justify-content: center;
            margin-bottom: 1rem;
        }
        .avatar-circle {
            background: linear-gradient(135deg, #1e2b3c, #0f1a24);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 25px -8px rgba(0,0,0,0.2);
            border: 2px solid white;
        }
        .avatar-circle i {
            font-size: 3.4rem;
            color: #ffe6b3;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }
        h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(120deg, #1F2B3C, #2C3E50);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .subhead {
            text-align: center;
            color: #4a5b6e;
            font-weight: 400;
            font-size: 0.95rem;
            margin-top: 0.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px dashed #dce5ec;
            display: inline-block;
            width: auto;
            padding-bottom: 0.4rem;
        }
        .desc {
            text-align: center;
            font-size: 0.9rem;
            color: #5d6f83;
            margin-bottom: 2rem;
            background: #eef3fc;
            padding: 0.6rem 1rem;
            border-radius: 60px;
            display: inline-block;
            width: auto;
            backdrop-filter: blur(2px);
        }

        /* button grid */
        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 1.1rem;
            margin-top: 0.8rem;
        }

        .btn-modern {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            padding: 1rem 1.5rem;
            border-radius: 2rem;
            text-decoration: none;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.02), 0 1px 2px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(2px);
        }

        .btn-modern:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.15);
            border-color: rgba(255, 255, 255, 0.7);
        }

        .btn-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .btn-icon {
            width: 44px;
            height: 44px;
            background: #f0f4f9;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.7rem;
            transition: 0.2s;
        }

        .btn-text {
            font-weight: 600;
            font-size: 1.05rem;
            color: #1a2c3e;
        }
        .btn-sub {
            font-size: 0.7rem;
            color: #6c819a;
            font-weight: 400;
            margin-top: 2px;
        }

        .btn-arrow {
            color: #9aaebf;
            font-size: 1.1rem;
            transition: 0.2s;
        }

        .btn-modern:hover .btn-arrow {
            transform: translateX(5px);
            color: #2c7da0;
        }

        /* specific brand colors on hover glow */
        .btn-wa:hover .btn-icon { background: #dcf8e5; color: #25D366; }
        .btn-wa:hover { border-left: 3px solid #25D366; }

        .btn-yt-channel:hover .btn-icon { background: #ffe6e5; color: #FF0000; }
        .btn-yt-channel:hover { border-left: 3px solid #FF0000; }

        .btn-tiktok:hover .btn-icon { background: #feeef5; color: #000000; }
        .btn-tiktok:hover { border-left: 3px solid #69C9D0; }

        .btn-tiktok-vid:hover .btn-icon { background: #eef5ff; color: #08a0e9; }
        .btn-tiktok-vid:hover { border-left: 3px solid #08a0e9; }

        /* footer */
        .footer-note {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 0.75rem;
            color: #7b8c9e;
            border-top: 1px solid #e2edf2;
            padding-top: 1.5rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .badge {
            background: #eef2fa;
            padding: 0.2rem 0.9rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .inner-padding {
                padding: 1.5rem 1.2rem 2rem;
            }
            .btn-modern {
                padding: 0.8rem 1.2rem;
            }
            .btn-icon {
                width: 38px;
                height: 38px;
                font-size: 1.4rem;
            }
            .btn-text {
                font-size: 0.95rem;
            }
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="inner-padding">
        <div class="avatar-icon">
            <div class="avatar-circle">
                <i class="fas fa-crown"></i>
            </div>
        </div>
        <h1>✨ mangjulzz <span style="font-weight:500;">portal</span></h1>
        <div style="text-align: center;">
            <div class="desc">

        <div class="links-grid">

            <a href="https://chat.whatsapp.com/LeNZbqyN7vpHsOIMaPfPoM" target="_blank" rel="noopener noreferrer" class="btn-modern btn-wa">
                <div class="btn-left">
                    <div class="btn-icon"><i class="fab fa-whatsapp"></i></div>
                    <div>
                        <div class="btn-text">Grup WhatsApp</div>
                        <div class="btn-sub">ngobrol seru & update</div>

            <a href="https://whatsapp.com/channel/0029VbCHQVp96H4IWVAEao0j" target="_blank" rel="noopener noreferrer" class="btn-modern btn-yt-channel">

                    <div>

                </div>
                <div class="btn-arrow"><i class="fas fa-arrow-right"></i></div>

            <!-- 3. TikTok profile @mangjulzz -->
            <a href="https://www.tiktok.com/@mangjulzz?_r=1&_t=ZS-97AgYE001Tt" target="_blank" rel="noopener noreferrer" class="btn-modern btn-tiktok">
                <div class="btn-left">
                    <div class="btn-icon"><i class="fab fa-tiktok"></i></div>
                    <div>
                        <div class="btn-text">TikTok @mangjulzz</div>
                        <div class="btn-sub">ikuti konten keren</div>
                    </div>
                </div>
                <div class="btn-arrow"><i class="fas fa-arrow-right"></i></div>
            </a>

            <!-- 4. TikTok Video (link langsung) -->
            <a href="https://vt.tiktok.com/ZSQubyEFV/" target="_blank" rel="noopener noreferrer" class="btn-modern btn-tiktok-vid">
                <div class="btn-left">
                    <div class="btn-icon"><i class="fas fa-video"></i></div>
                    <div>
                        <div class="btn-text">TikTok Video Pilihan</div>
                        <div class="btn-sub">tonton langsung 🤩</div>
                    </div>
                </div>
                <div class="btn-arrow"><i class="fas fa-arrow-right"></i></div>
            </a>
        </div>

        <div class="footer-note">
            <span class="badge"><i class="far fa-clock"></i> 24/7 akses</span>
            <span class="badge"><i class="fas fa-shield-alt"></i> aman & cepat</span>
            <span class="badge"><i class="fas fa-mobile-alt"></i> mobile friendly</span>
        </div>
    </div>
</div>

<!-- optional small effect: ripple click? not needed, but modern touch -->

    // just a subtle console greeting, no intrusive logic
    console.log("✨ Modern UI link hub | mangjulzz");

</body>
</html>
